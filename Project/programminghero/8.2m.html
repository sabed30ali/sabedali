<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    <style>
        img {
            width: 100%;
            height: 100%;
        }
        .row{
            height: 400px;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>My College Image</h1>
    </header>
    <main>
        <section>
            <div class="row">
                <img src="pic/a.jpg" alt="My College Image">
            </div>
            <div class="row">
                <img src="pic/b.jpg" alt="My College Image">
                <img src="pic/c.jpg" alt="My College Image">
                
            </div>
        </section>
    </main>
</body>
